}).filter(Boolean);
const SAMPLES=[
  {title:"新生兒照護示範課",date:"2026-04-08",time:"10:00 – 11:00",instructor:"林護理長",description:"教導媽媽正確的寶寶抱姿、換尿布、臍帶護理等基礎照護技巧，讓新手媽咪更有自信。",capacity:12,registrations:[]},
  {title:"哺乳技巧與泌乳衛教",date:"2026-04-10",time:"14:00 – 15:00",instructor:"陳泌乳顧問",description:"由專業泌乳顧問指導正確含乳姿勢、增加奶量的方法，並解答常見哺乳問題。",capacity:10,registrations:[]},
];

function App(){
  const [page,setPage]=React.useState("home");
  const [classes,setClasses]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [selId,setSelId]=React.useState(null);
  const [adminTab,setAdminTab]=React.useState("list");
  const [pw,setPw]=React.useState("");
  const [pwErr,setPwErr]=React.useState(false);
  const [isAdmin,setIsAdmin]=React.useState(false);
  const [room,setRoom]=React.useState("");
  const [name,setName]=React.useState("");
  const [form,setForm]=React.useState({title:"",date:"",time:"",instructor:"",description:"",capacity:"12"});
  const [toast,setToast]=React.useState(null);
  const inited=React.useRef(false);

  const fire=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),3000)};

  React.useEffect(()=>{
    const unsub=db.collection("classes").onSnapshot(async snap=>{
      if(snap.empty&&!inited.current){
        inited.current=true;
        for(const s of SAMPLES) await db.collection("classes").add(s);
        return;
      }
      inited.current=true;
      const data=snap.docs.map(d=>({id:d.id,...d.data()}));
      data.sort((a,b)=>a.date>b.date?1:-1);
      setClasses(data);
      setLoading(false);
    },()=>setLoading(false));
    return()=>unsub();
  },[]);

  const sel=classes.find(c=>c.id===selId);
  const taken=(sel?.registrations||[]).map(r=>r.room);

  const doLogin=()=>{
    if(pw===PASS){setIsAdmin(true);setPage("admin");setPw("");setPwErr(false);}
    else{setPwErr(true);setPw("");}
  };

  const doReg=async()=>{
    if(!room){fire("請選擇房號",false);return;}
    if(!name.trim()){fire("請輸入姓名",false);return;}
    if(taken.includes(room)){fire(`${room} 已報名`,false);return;}
    if((sel.registrations||[]).length>=sel.capacity){fire("名額已滿",false);return;}
    try{
      await db.collection("classes").doc(selId).update({registrations:[...(sel.registrations||[]),{room,name:name.trim()}]});
      fire(`${room} ${name.trim()} 報名成功！`);
      setRoom("");setName("");setPage("home");setSelId(null);
    }catch{fire("報名失敗",false);}
  };

  const doAdd=async()=>{
    if(!form.title||!form.date||!form.time||!form.instructor){fire("請填寫必填欄位",false);return;}
    try{
      await db.collection("classes").add({...form,capacity:+form.capacity||12,registrations:[]});
      setForm({title:"",date:"",time:"",instructor:"",description:"",capacity:"12"});
      fire("課程新增成功！");setAdminTab("list");
    }catch{fire("新增失敗",false);}
  };

  const doDel=async(id)=>{
    if(!window.confirm("確定刪除？"))return;
    try{await db.collection("classes").doc(id).delete();fire("課程已刪除");}
    catch{fire("刪除失敗",false);}
  };

  const inp={width:"100%",padding:"11px 14px",borderRadius:10,border:"1.5px solid #bfdbfe",fontSize:14,background:"#f8fbff",color:"#1a2f5e"};

  if(loading)return(
    <div style={{minHeight:"100vh",background:"#f0f6ff",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <img src={`data:image/jpeg;base64,${LOGO}`} style={{width:80,height:80,borderRadius:16,objectFit:"cover"}}/>
      <div style={{fontSize:16,color:"#2563eb",fontWeight:700}}>載入中...</div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"#f0f6ff"}}>
      {toast&&<div style={{position:"fixed",top:24,left:"50%",transform:"translateX(-50%)",zIndex:9999,padding:"12px 32px",borderRadius:50,background:toast.ok?"#eff6ff":"#fef2f2",border:`1.5px solid ${toast.ok?"#93c5fd":"#fca5a5"}`,color:toast.ok?"#1e40af":"#991b1b",fontWeight:700,fontSize:14,boxShadow:"0 8px 32px rgba(0,0,0,.12)",whiteSpace:"nowrap"}}>{toast.msg}</div>}

      <header style={{background:"linear-gradient(135deg,#1e40af,#2563eb,#3b82f6)",color:"#fff",boxShadow:"0 4px 20px rgba(37,99,235,.25)"}}>
        <div style={{maxWidth:900,margin:"0 auto",padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:76}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <img src={`data:image/jpeg;base64,${LOGO}`} style={{width:54,height:54,borderRadius:12,objectFit:"cover",border:"2px solid rgba(255,255,255,.35)"}}/>
            <div>
              <div style={{fontWeight:900,fontSize:18,letterSpacing:3,lineHeight:1.2}}>愛兒家 雙親教室報名</div>
              <div style={{fontSize:11,opacity:.75,letterSpacing:2,marginTop:2}}>ELGAR POSTPARTUM CARE</div>
            </div>
          </div>
          <button className="btn" onClick={()=>{if(page==="adminLogin"||page==="admin"){setPage("home");setIsAdmin(false);}else setPage(isAdmin?"admin":"adminLogin");}} style={{padding:"8px 20px",borderRadius:50,border:"1.5px solid rgba(255,255,255,.5)",background:"rgba(255,255,255,.12)",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer",letterSpacing:1}}>
            {page==="admin"||page==="adminLogin"?"← 返回":"⚙ 管理登入"}
          </button>
        </div>
      </header>

      <main style={{maxWidth:900,margin:"0 auto",padding:"40px 20px 80px"}}>

        {page==="home"&&<>
          <div style={{textAlign:"center",marginBottom:40}}>
            <img src={`data:image/jpeg;base64,${LOGO}`} style={{width:90,height:90,borderRadius:20,objectFit:"cover",marginBottom:14,boxShadow:"0 6px 24px rgba(37,99,235,.18)"}}/>
            <h1 style={{fontSize:30,fontWeight:900,color:"#1e3a8a",letterSpacing:2,marginBottom:8}}>雙親教室報名</h1>
            <p style={{color:"#6b8cc7",fontSize:14,letterSpacing:1}}>歡迎各位媽媽報名參加，請選擇您有興趣的課程</p>
          </div>
          {classes.length===0
            ?<div style={{textAlign:"center",color:"#93c5fd",marginTop:60,fontSize:16}}>目前無開放課程</div>
            :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:22}}>
              {classes.map(cls=>{
                const regs=cls.registrations||[];
                const spots=cls.capacity-regs.length;
                const full=spots<=0;
                return(
                  <div key={cls.id} className="hl" style={{background:"#fff",borderRadius:20,overflow:"hidden",boxShadow:"0 4px 16px rgba(37,99,235,.09)",border:"1px solid #dbeafe"}}>
                    <div style={{background:"linear-gradient(135deg,#eff6ff,#dbeafe)",padding:"22px 24px 18px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                        <h3 style={{fontSize:17,fontWeight:900,color:"#1e3a8a",lineHeight:1.35,flex:1}}>{cls.title}</h3>
                        <span style={{fontSize:11,fontWeight:800,borderRadius:50,padding:"3px 10px",marginLeft:8,flexShrink:0,background:full?"#fee2e2":spots<=3?"#fef3c7":"#dcfce7",color:full?"#dc2626":spots<=3?"#d97706":"#15803d"}}>{full?"額滿":`餘 ${spots} 位`}</span>
                      </div>
                    </div>
                    <div style={{padding:"16px 24px 22px"}}>
                      <div style={{fontSize:13,color:"#6b8cc7",lineHeight:2}}>
                        <div>📅 {cls.date}</div><div>⏰ {cls.time}</div><div>👩‍⚕️ {cls.instructor}</div>
                      </div>
                      {cls.description&&<p style={{fontSize:13,color:"#94afd4",margin:"10px 0 16px",lineHeight:1.7,borderTop:"1px solid #eff6ff",paddingTop:10}}>{cls.description}</p>}
                      <button disabled={full} className="btn" onClick={()=>{setSelId(cls.id);setPage("register");}} style={{width:"100%",padding:11,borderRadius:12,border:"none",background:full?"#f1f5f9":"linear-gradient(135deg,#2563eb,#1e40af)",color:full?"#a0b4cc":"#fff",fontWeight:800,fontSize:14,cursor:full?"not-allowed":"pointer",letterSpacing:1,boxShadow:full?"none":"0 4px 14px rgba(37,99,235,.3)"}}>{full?"名額已滿":"立即報名 →"}</button>
                    </div>
                  </div>
                );
              })}
            </div>
          }
        </>}

        {page==="register"&&sel&&<div style={{maxWidth:560,margin:"0 auto"}}>
          <button onClick={()=>{setPage("home");setSelId(null);setRoom("");setName("");}} style={{background:"none",border:"none",color:"#2563eb",fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:24}}>← 返回課程列表</button>
          <div style={{background:"#fff",borderRadius:22,overflow:"hidden",boxShadow:"0 8px 32px rgba(37,99,235,.12)",border:"1px solid #dbeafe"}}>
            <div style={{background:"linear-gradient(135deg,#1e40af,#2563eb)",padding:"26px 32px",color:"#fff"}}>
              <div style={{fontSize:11,opacity:.7,letterSpacing:2,marginBottom:8}}>課程報名</div>
              <h2 style={{fontSize:22,fontWeight:900,marginBottom:12}}>{sel.title}</h2>
              <div style={{fontSize:13,opacity:.88,lineHeight:2,display:"flex",flexWrap:"wrap",gap:"0 24px"}}>
                <span>📅 {sel.date}</span><span>⏰ {sel.time}</span><span>👩‍⚕️ {sel.instructor}</span>
                <span>🪑 餘 {sel.capacity-(sel.registrations||[]).length} / {sel.capacity} 位</span>
              </div>
            </div>
            <div style={{padding:"28px 32px"}}>
              <div style={{marginBottom:24}}>
                <label style={{display:"block",fontSize:14,fontWeight:800,color:"#1e40af",marginBottom:8}}>選擇房號 *</label>
                <select value={room} onChange={e=>setRoom(e.target.value)} style={{width:"100%",padding:"12px 16px",borderRadius:12,border:"1.5px solid #bfdbfe",fontSize:15,background:"#f8fbff",cursor:"pointer"}}>
                  <option value="">-- 請選擇房號 --</option>
                  {ROOMS.map(r=>{const tk=taken.includes(r);return <option key={r} value={r} disabled={tk}>{r}{tk?"（已報名）":""}</option>;})}
                </select>
                {room&&<div style={{marginTop:8,fontSize:13,color:"#2563eb",fontWeight:700}}>✓ 已選擇：{room}</div>}
              </div>
              <div style={{marginBottom:24}}>
                <label style={{display:"block",fontSize:14,fontWeight:800,color:"#1e40af",marginBottom:8}}>媽媽姓名 *</label>
                <input value={name} onChange={e=>setName(e.target.value)} placeholder="請輸入您的姓名" style={{width:"100%",padding:"12px 16px",borderRadius:12,border:"1.5px solid #bfdbfe",fontSize:15,background:"#f8fbff",color:"#1a2f5e"}}/>
              </div>
              <button onClick={doReg} className="btn" style={{width:"100%",padding:14,borderRadius:12,border:"none",background:"linear-gradient(135deg,#2563eb,#1e40af)",color:"#fff",fontWeight:900,fontSize:16,cursor:"pointer",letterSpacing:2,boxShadow:"0 6px 20px rgba(37,99,235,.32)"}}>確認報名 ✓</button>
            </div>
          </div>
        </div>}

        {page==="adminLogin"&&<div style={{maxWidth:380,margin:"60px auto 0"}}>
          <div style={{background:"#fff",borderRadius:22,padding:"40px 36px",boxShadow:"0 8px 36px rgba(37,99,235,.14)",border:"1px solid #dbeafe",textAlign:"center"}}>
            <div style={{fontSize:42,marginBottom:16}}>🔐</div>
            <h2 style={{fontSize:20,fontWeight:900,color:"#1e3a8a",marginBottom:6}}>管理員登入</h2>
            <p style={{fontSize:13,color:"#6b8cc7",marginBottom:28}}>請輸入管理密碼以繼續</p>
            <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setPwErr(false);}} onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="請輸入密碼" style={{width:"100%",padding:"12px 16px",borderRadius:12,border:`1.5px solid ${pwErr?"#fca5a5":"#bfdbfe"}`,fontSize:15,background:"#f8fbff",marginBottom:8,textAlign:"center",letterSpacing:4}}/>
            {pwErr&&<p style={{fontSize:12,color:"#dc2626",marginBottom:12}}>密碼錯誤，請再試一次</p>}
            <button onClick={doLogin} className="btn" style={{width:"100%",padding:13,marginTop:12,borderRadius:12,border:"none",background:"linear-gradient(135deg,#2563eb,#1e40af)",color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer",boxShadow:"0 4px 16px rgba(37,99,235,.28)"}}>登入</button>
          </div>
        </div>}

        {page==="admin"&&isAdmin&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:28,flexWrap:"wrap",gap:12}}>
            <div>
              <h2 style={{fontSize:24,fontWeight:900,color:"#1e3a8a"}}>課程管理</h2>
              <p style={{fontSize:13,color:"#6b8cc7",marginTop:2}}>共 {classes.length} 個課程・資料即時同步 ☁️</p>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {[["list","📋 課程列表"],["add","＋ 新增課程"]].map(([k,l])=>(
                <button key={k} onClick={()=>setAdminTab(k)} className="btn" style={{padding:"9px 20px",borderRadius:10,border:"1.5px solid",borderColor:adminTab===k?"#2563eb":"#bfdbfe",background:adminTab===k?"#2563eb":"#fff",color:adminTab===k?"#fff":"#2563eb",fontWeight:700,fontSize:13,cursor:"pointer"}}>{l}</button>
              ))}
            </div>
          </div>

          {adminTab==="list"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
            {classes.length===0&&<div style={{textAlign:"center",color:"#93c5fd",marginTop:40,fontSize:15}}>尚無課程，請新增</div>}
            {classes.map(cls=>{
              const regs=cls.registrations||[];
              return(
                <div key={cls.id} style={{background:"#fff",borderRadius:16,border:"1px solid #dbeafe",overflow:"hidden",boxShadow:"0 2px 10px rgba(37,99,235,.07)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"18px 24px",gap:12,flexWrap:"wrap"}}>
                    <div style={{flex:1}}>
                      <h3 style={{fontSize:17,fontWeight:800,color:"#1e3a8a",marginBottom:6}}>{cls.title}</h3>
                      <div style={{fontSize:13,color:"#6b8cc7",lineHeight:1.9}}>
                        <span style={{marginRight:18}}>📅 {cls.date}</span>
                        <span style={{marginRight:18}}>⏰ {cls.time}</span>
                        <span style={{marginRight:18}}>👩‍⚕️ {cls.instructor}</span>
                        <span style={{fontWeight:700,color:regs.length>=cls.capacity?"#dc2626":"#2563eb"}}>報名：{regs.length} / {cls.capacity}</span>
                      </div>
                      {cls.description&&<p style={{fontSize:12,color:"#93afd4",marginTop:6}}>{cls.description}</p>}
                    </div>
                    <button onClick={()=>doDel(cls.id)} style={{padding:"7px 16px",borderRadius:8,border:"1.5px solid #fca5a5",background:"#fff5f5",color:"#dc2626",fontWeight:700,fontSize:12,cursor:"pointer",flexShrink:0}}>刪除</button>
                  </div>
                  {regs.length>0&&<div style={{borderTop:"1px solid #eff6ff",padding:"14px 24px",background:"#f8fbff"}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#3b82f6",marginBottom:10}}>報名名單（{regs.length} 人）</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                      {regs.map((r,i)=><div key={i} style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"6px 14px",fontSize:13,color:"#1e40af",fontWeight:600}}><span style={{fontWeight:900}}>{r.room}</span> {r.name}</div>)}
                    </div>
                  </div>}
                </div>
              );
            })}
          </div>}

          {adminTab==="add"&&<div style={{background:"#fff",borderRadius:20,padding:"32px 36px",border:"1px solid #dbeafe",maxWidth:580,boxShadow:"0 6px 24px rgba(37,99,235,.10)"}}>
            <h3 style={{fontSize:18,fontWeight:900,color:"#1e3a8a",marginBottom:24}}>新增課程資料</h3>
            <div style={{display:"flex",flexDirection:"column",gap:18}}>
              {[{l:"課程名稱 *",k:"title",ph:"例：新生兒照護示範課"},{l:"上課時間 *",k:"time",ph:"例：10:00 – 11:00"},{l:"講師姓名 *",k:"instructor",ph:"例：林護理長"}].map(f=>(
                <div key={f.k}>
                  <label style={{display:"block",fontSize:13,fontWeight:700,color:"#1e40af",marginBottom:7}}>{f.l}</label>
                  <input value={form[f.k]} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} placeholder={f.ph} style={inp}/>
                </div>
              ))}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                <div>
                  <label style={{display:"block",fontSize:13,fontWeight:700,color:"#1e40af",marginBottom:7}}>上課日期 *</label>
                  <input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} style={inp}/>
                </div>
                <div>
                  <label style={{display:"block",fontSize:13,fontWeight:700,color:"#1e40af",marginBottom:7}}>名額上限</label>
                  <input type="number" value={form.capacity} onChange={e=>setForm(p=>({...p,capacity:e.target.value}))} placeholder="12" style={inp}/>
                </div>
              </div>
              <div>
                <label style={{display:"block",fontSize:13,fontWeight:700,color:"#1e40af",marginBottom:7}}>課程說明</label>
                <textarea value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))} placeholder="簡要說明課程內容..." rows={3} style={{...inp,resize:"vertical",lineHeight:1.7}}/>
              </div>
            </div>
            <button onClick={doAdd} className="btn" style={{width:"100%",marginTop:26,padding:14,borderRadius:12,border:"none",background:"linear-gradient(135deg,#2563eb,#1e40af)",color:"#fff",fontWeight:900,fontSize:15,cursor:"pointer",letterSpacing:2,boxShadow:"0 6px 20px rgba(37,99,235,.28)"}}>新增課程 ＋</button>
          </div>}
        </>}
      </main>
      <footer style={{textAlign:"center",padding:"20px 0 36px",fontSize:12,color:"#93afd4",letterSpacing:1}}>© 愛兒家 雙親教室報名系統</footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
